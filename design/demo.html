<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡牌对战 · 玩法 Demo</title>
<style>
  :root{
    --bg:#0e1320; --panel:#1a2235; --panel2:#222d45; --gold:#ffd34d;
    --hp:#36d399; --enemy:#f87171; --ink:#e6ecf5; --muted:#8aa0c0;
    --human:#4aa3ff; --undead:#b07bff; --orc:#4cd07d; --mech:#ff9f43;
  }
  *{box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#1b2742,#0e1320 60%);color:var(--ink);min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:14px}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  h1{font-size:20px;margin:0;letter-spacing:1px}
  h1 small{color:var(--muted);font-size:12px;font-weight:400;margin-left:8px}
  .controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .lvl{display:flex;align-items:center;gap:8px;background:var(--panel);padding:6px 12px;border-radius:10px;font-size:13px}
  .lvl input{width:130px}
  .lvl b{color:var(--gold);min-width:54px;display:inline-block;text-align:right}
  button.btn{background:linear-gradient(180deg,#3b4f7a,#2a3a5e);color:#fff;border:1px solid #4a64a0;
    border-radius:10px;padding:7px 14px;font-size:13px;cursor:pointer}
  button.btn:hover{filter:brightness(1.12)}
  #stage{position:relative;width:100%;border-radius:14px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  canvas{display:block;width:100%;background:linear-gradient(90deg,#16321f 0%,#1a2a3a 50%,#3a1f24 100%)}
  .overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
    background:rgba(8,12,22,.78);text-align:center}
  .overlay.show{display:flex}
  .overlay h2{font-size:40px;margin:0 0 8px}
  .win{color:var(--hp)} .lose{color:var(--enemy)}
  .elixbar{display:flex;align-items:center;gap:8px;margin:10px 0 6px}
  .pips{display:flex;gap:4px;flex:1}
  .pip{height:14px;flex:1;border-radius:4px;background:#2a2150;border:1px solid #46377e}
  .pip.on{background:linear-gradient(180deg,#d96bff,#9b3cff);border-color:#c98bff}
  .elixn{color:#d96bff;font-weight:700;min-width:60px}
  .hand{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid #33405f;border-radius:12px;
    padding:8px;cursor:pointer;position:relative;transition:.12s;user-select:none}
  .card:hover{transform:translateY(-3px)}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,211,77,.35)}
  .card.cant{opacity:.45;filter:grayscale(.4)}
  .card .emo{font-size:30px;text-align:center;line-height:1.1}
  .card .nm{font-size:13px;font-weight:700;text-align:center;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .meta{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;margin-top:4px}
  .card .cost{position:absolute;top:-8px;right:-8px;background:#9b3cff;color:#fff;border-radius:50%;
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid #1a2235}
  .q传奇{color:#ffce4d} .q史诗{color:#d580ff} .q稀有{color:#5db3ff} .q普通{color:#cfd8e6}
  .tip{color:var(--muted);font-size:12px;margin-top:10px;line-height:1.6}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>卡牌对战 · 玩法 Demo <small>用真实数值的迷你对线推塔</small></h1>
    <div class="controls">
      <div class="lvl">卡牌等级
        <input id="lvl" type="range" min="1" max="30" value="1">
        <b id="lvlv">Lv1 ×1.00</b>
      </div>
      <button class="btn" id="restart">重新开始</button>
    </div>
  </header>

  <div id="stage">
    <canvas id="cv" width="960" height="430"></canvas>
    <div class="overlay" id="over">
      <h2 id="overt"></h2>
      <button class="btn" id="again">再来一局</button>
    </div>
  </div>

  <div class="elixbar">
    <div class="pips" id="pips"></div>
    <div class="elixn" id="elixn">圣水 0/10</div>
  </div>
  <div class="hand" id="hand"></div>

  <div class="legend">
    <span><i style="background:var(--human)"></i>人类</span>
    <span><i style="background:var(--undead)"></i>亡灵</span>
    <span><i style="background:var(--orc)"></i>兽人</span>
    <span><i style="background:var(--mech)"></i>机械</span>
    <span>左半场=你的部署区，右侧为敌方</span>
  </div>
  <div class="tip">
    玩法：圣水自动回复 → 点选下方手牌 → 在<strong>左半场</strong>点击放置单位。单位会自动前进、索敌、攻击，摧毁<strong>敌方主塔</strong>即获胜。
    拖动上方「卡牌等级」滑条可实时看到升级曲线让单位变强（血量/攻击随品质成长，攻击间隔/速度温和变快）。
  </div>
</div>

<script>
// ===================== 卡牌数据（真实数值） =====================
// hp,atk: 初始值; spd,iv: 秒(越小越快); rng: 张牌(射程); q:品质; f:阵营; melee:近战
const FACTION={'人类':'human','亡灵':'undead','兽人':'orc','机械':'mech'};
const FCOLOR={human:'#4aa3ff',undead:'#b07bff',orc:'#4cd07d',mech:'#ff9f43'};
const COST={'传奇':5,'史诗':4,'稀有':3,'普通':2};
const GROWTH={'传奇':(3.0-1)/29,'史诗':(2.74-1)/29,'稀有':(2.48-1)/29,'普通':(2.22-1)/29};

const DB={
  knight:{nm:'骑士',f:'人类',q:'史诗',melee:true,hp:300,atk:55,spd:1.2,iv:2.5,rng:1,emo:'⚔️',sk:'突进冲锋'},
  musket:{nm:'火枪手',f:'亡灵',q:'普通',melee:false,hp:82,atk:21,spd:1.6,iv:1.5,rng:1,emo:'🔫',sk:'箭雨'},
  hound:{nm:'利爪猎犬',f:'兽人',q:'稀有',melee:true,hp:250,atk:42,spd:1.8,iv:2.2,rng:1,emo:'🐺',sk:'嗜血冲刺'},
  firedragon:{nm:'火龙',f:'兽人',q:'史诗',melee:false,hp:440,atk:71,spd:1.1,iv:1.5,rng:1,emo:'🔥',sk:'爆裂吐息'},
  flamequeen:{nm:'龙焰女王',f:'人类',q:'传奇',melee:true,hp:950,atk:80,spd:0.5,iv:2.8,rng:1,emo:'🐲',sk:'烈焰风暴'},
  skshield:{nm:'骷髅刀盾兵',f:'亡灵',q:'普通',melee:true,hp:98,atk:25,spd:1.4,iv:1.5,rng:1,emo:'💀',sk:'尸爆'},
  ballista:{nm:'弩车',f:'机械',q:'稀有',melee:false,hp:200,atk:92,spd:0.8,iv:2.5,rng:1,emo:'🎯',sk:'蒸汽冲刺'},
  icetroll:{nm:'寒冰巨魔',f:'亡灵',q:'传奇',melee:false,hp:1052,atk:72,spd:1.0,iv:2.0,rng:1,emo:'🧊',sk:'寒冰冻结'},
  // 敌方常用
  infantry:{nm:'重步兵',f:'人类',q:'稀有',melee:true,hp:260,atk:30,spd:1.2,iv:1.5,rng:1,emo:'🛡️',sk:'盾反'},
  witch:{nm:'见习女巫',f:'人类',q:'稀有',melee:false,hp:120,atk:35,spd:1.2,iv:1.5,rng:1,emo:'🔮',sk:'分裂箭'},
  bat:{nm:'蝙蝠突袭者',f:'亡灵',q:'稀有',melee:true,hp:135,atk:40,spd:1.2,iv:1.5,rng:1,emo:'🦇',sk:'暗影突袭'},
  golem:{nm:'巨石魔像',f:'亡灵',q:'史诗',melee:true,hp:410,atk:65,spd:1.2,iv:1.5,rng:1,emo:'🗿',sk:'投石'},
  assassin:{nm:'幻影刺客',f:'兽人',q:'传奇',melee:true,hp:972,atk:152,spd:1.1,iv:1.7,rng:1,emo:'🗡️',sk:'镜像分身'},
  boar:{nm:'小野猪人',f:'兽人',q:'普通',melee:true,hp:84,atk:21,spd:1.4,iv:1.6,rng:1,emo:'🐗',sk:'死亡炸弹'},
  flak:{nm:'高射塔',f:'机械',q:'稀有',melee:false,hp:400,atk:86,spd:2.0,iv:1.5,rng:3,emo:'🗼',sk:'急速射击'},
  winterking:{nm:'永冬之王',f:'亡灵',q:'传奇',melee:false,hp:680,atk:75,spd:0.6,iv:2.6,rng:1,emo:'❄️',sk:'炼狱火雨'},
  cannon:{nm:'巨石车',f:'机械',q:'史诗',melee:false,hp:502,atk:205,spd:1.2,iv:2.5,rng:3,emo:'🚜',sk:'火力覆盖'},
};
const PLAYER_DECK=['knight','musket','hound','firedragon','flamequeen','skshield','ballista','icetroll'];
const ENEMY_DECK=['infantry','witch','bat','golem','assassin','boar','flak','winterking','cannon'];

// ===================== 等级缩放 =====================
let LEVEL=1;
function scaled(card){
  const g=GROWTH[card.q];
  const m=1+g*(LEVEL-1);
  const iv=card.iv*(1-0.10/29*(LEVEL-1));
  const spd=card.spd*(1-0.08/29*(LEVEL-1));
  return {hp:Math.round(card.hp*m),atk:Math.round(card.atk*m),iv,spd,rng:card.rng};
}

// ===================== 画布与坐标 =====================
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const PBASE={x:46,y:H/2}, EBASE={x:W-46,y:H/2};
const TILE=58;
function moveSpeed(spd){return Math.max(20,Math.min(150,86/spd));}      // px/s
function attackRangePx(rng){return rng<=1?46:rng*46;}

// ===================== 实体 =====================
let units=[], shots=[], floats=[], particles=[];
let pBaseHP=3200, eBaseHP=3200, pBaseMax=3200, eBaseMax=3200;
let baseCd={p:0,e:0};
let gameOver=false;

function spawn(id,side,x,y){
  const c=DB[id], s=scaled(c);
  units.push({id,side,c,x,y,
    hp:s.hp,max:s.hp,atk:s.atk,iv:s.iv,cd:0,
    rng:attackRangePx(s.rng),aoe:s.rng>=3,
    vmax:moveSpeed(s.spd),r:16,melee:c.melee,
    color:FCOLOR[FACTION[c.f]],hitFx:0});
}

function enemiesOf(side){return units.filter(u=>u.side!==side&&u.hp>0)}
function nearest(u,list){
  let best=null,bd=1e9;
  for(const e of list){const d=Math.hypot(e.x-u.x,e.y-u.y); if(d<bd){bd=d;best=e;}}
  return [best,bd];
}

function dealDamage(t,dmg,fromBase){
  t.hp-=dmg; t.hitFx=0.15;
  floats.push({x:t.x,y:t.y-22,t:0,txt:'-'+Math.round(dmg),c:'#fff'});
}
function baseDamage(side,dmg,x,y){
  if(side==='p'){pBaseHP-=dmg;} else {eBaseHP-=dmg;}
  floats.push({x,y:y-26,t:0,txt:'-'+Math.round(dmg),c:'#ffd34d'});
}

// ===================== 战斗逻辑 =====================
function moveTo(u,tx,ty,dt){
  const dx=tx-u.x,dy=ty-u.y,d=Math.hypot(dx,dy)||1;
  // 简单分离，避免重叠
  let sx=0,sy=0;
  for(const o of units){if(o!==u&&o.hp>0){const ox=u.x-o.x,oy=u.y-o.y,od=Math.hypot(ox,oy); if(od<u.r+o.r&&od>0){sx+=ox/od;sy+=oy/od;}}}
  const vx=dx/d+sx*0.6, vy=dy/d+sy*0.6, vl=Math.hypot(vx,vy)||1;
  u.x+=vx/vl*u.vmax*dt; u.y+=vy/vl*u.vmax*dt;
  u.y=Math.max(40,Math.min(H-40,u.y));
}
function attack(u,t){
  if(u.melee){ dealDamage(t,u.atk); lunge(u,t); }
  else { shots.push({x:u.x,y:u.y,tx:t,dmg:u.atk,sp:300,col:u.color,aoe:u.aoe,side:u.side,shooterSide:u.side}); }
}
function attackBase(u){
  const b=u.side==='p'?EBASE:PBASE;
  if(u.melee){ baseDamage(u.side==='p'?'e':'p',u.atk,b.x,b.y); lungeXY(u,b.x,b.y); }
  else { shots.push({x:u.x,y:u.y,bx:b.x,by:b.y,tx:{x:b.x,y:b.y,hp:1,isBase:true,bside:u.side==='p'?'e':'p',dmg:u.atk},dmg:u.atk,sp:300,col:u.color,side:u.side}); }
}
function lunge(u,t){const dx=t.x-u.x,dy=t.y-u.y,d=Math.hypot(dx,dy)||1; u.x+=dx/d*6;u.y+=dy/d*6;}
function lungeXY(u,x,y){const dx=x-u.x,dy=y-u.y,d=Math.hypot(dx,dy)||1; u.x+=dx/d*6;u.y+=dy/d*6;}
function burst(x,y,c){for(let i=0;i<8;i++){const a=Math.random()*6.28,s=40+Math.random()*70;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:0,c});}}

// ===================== 渲染 =====================
function draw(){
  ctx.clearRect(0,0,W,H);
  // 中线
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  // 部署区
  ctx.fillStyle='rgba(74,163,255,.06)';ctx.fillRect(0,0,W/2,H);
  // 主塔
  drawBase(PBASE,pBaseHP,pBaseMax,'#4aa3ff','你');
  drawBase(EBASE,eBaseHP,eBaseMax,'#f87171','敌');
  // 粒子
  for(const p of particles){ctx.globalAlpha=Math.max(0,1-p.t/0.5);ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,3,3);ctx.globalAlpha=1;}
  // 单位
  for(const u of units){
    // 阴影
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(u.x,u.y+14,16,6,0,0,6.28);ctx.fill();
    // 身体
    ctx.fillStyle=u.hitFx>0?'#fff':u.color;
    ctx.beginPath();ctx.arc(u.x,u.y,u.r,0,6.28);ctx.fill();
    ctx.lineWidth=2.5;ctx.strokeStyle=u.side==='p'?'#dff1ff':'#ffd9d9';ctx.stroke();
    ctx.font='17px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(u.c.emo,u.x,u.y+1);
    // 血条
    const w=30,hpw=w*Math.max(0,u.hp/u.max);
    ctx.fillStyle='#000a';ctx.fillRect(u.x-w/2,u.y-u.r-9,w,5);
    ctx.fillStyle=u.side==='p'?'#36d399':'#f87171';ctx.fillRect(u.x-w/2,u.y-u.r-9,hpw,5);
  }
  // 抛射物
  for(const s of shots){ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x,s.y,4,0,6.28);ctx.fill();}
  // 漂浮字
  ctx.font='bold 14px sans-serif';
  for(const f of floats){ctx.globalAlpha=Math.max(0,1-f.t/0.8);ctx.fillStyle=f.c;ctx.fillText(f.txt,f.x,f.y);ctx.globalAlpha=1;}
}
function drawBase(b,hp,max,col,label){
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(b.x-26,b.y-34,52,68);
  ctx.fillStyle=col;ctx.globalAlpha=.85;ctx.fillRect(b.x-24,b.y-32,48,64);ctx.globalAlpha=1;
  ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🏰',b.x,b.y);
  const w=56,hpw=w*Math.max(0,hp/max);
  ctx.fillStyle='#000a';ctx.fillRect(b.x-w/2,b.y-46,w,7);
  ctx.fillStyle=col;ctx.fillRect(b.x-w/2,b.y-46,hpw,7);
  ctx.fillStyle='#cdd8ea';ctx.font='11px sans-serif';ctx.fillText(label+' '+Math.max(0,Math.round(hp)),b.x,b.y-54);
}

// ===================== 圣水 / 手牌 =====================
let elixir=5; const ELIX_MAX=10;
let queue=[], hand=[], sel=-1;
function initDeck(){
  queue=[...PLAYER_DECK]; shuffle(queue);
  hand=queue.splice(0,4);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function renderHand(){
  const el=document.getElementById('hand'); el.innerHTML='';
  hand.forEach((id,i)=>{
    const c=DB[id], cost=COST[c.q];
    const d=document.createElement('div');
    d.className='card'+(i===sel?' sel':'')+(elixir<cost?' cant':'');
    d.innerHTML=`<div class="cost">${cost}</div><div class="emo">${c.emo}</div>
      <div class="nm q${c.q}">${c.nm}</div>
      <div class="meta"><span>${c.q}</span><span>${c.melee?'近战':'远程'}</span></div>`;
    d.onclick=()=>{ sel=(sel===i?-1:i); renderHand(); };
    el.appendChild(d);
  });
}
function renderElix(){
  const pips=document.getElementById('pips'); pips.innerHTML='';
  for(let i=0;i<ELIX_MAX;i++){const p=document.createElement('div');p.className='pip'+(i<Math.floor(elixir)?' on':'');pips.appendChild(p);}
  document.getElementById('elixn').textContent='圣水 '+Math.floor(elixir)+'/'+ELIX_MAX;
}
cv.addEventListener('click',e=>{
  if(gameOver||sel<0)return;
  const rect=cv.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(W/rect.width);
  const y=(e.clientY-rect.top)*(H/rect.height);
  if(x>W/2-10)return;                       // 只能左半场
  const id=hand[sel], cost=COST[DB[id].q];
  if(elixir<cost)return;
  elixir-=cost;
  spawn(id,'p',Math.max(60,x),y);
  // 换牌
  queue.push(id); hand[sel]=queue.shift(); sel=-1;
  renderHand(); renderElix();
});

// ===================== 敌方 AI =====================
let eElix=5, aiTimer=2;
function aiStep(dt){
  eElix=Math.min(ELIX_MAX,eElix+dt/2.6);
  aiTimer-=dt;
  if(aiTimer<=0){
    aiTimer=1.6+Math.random()*2.2;
    const id=ENEMY_DECK[Math.floor(Math.random()*ENEMY_DECK.length)];
    const cost=COST[DB[id].q];
    if(eElix>=cost){ eElix-=cost; spawn(id,'e',W-80-Math.random()*180,60+Math.random()*(H-120)); }
  }
}

// ===================== 主循环 =====================
let last=0;
function loop(ts){
  const dt=Math.min(0.05,(ts-last)/1000||0); last=ts;
  if(!gameOver){
    elixir=Math.min(ELIX_MAX,elixir+dt/2.6); renderElix();
    aiStep(dt);
    stepFull(dt);
  }
  draw();
  requestAnimationFrame(loop);
}
// 重新实现 step，并加入抛射物打塔判定
function stepFull(dt){
  if(gameOver)return;
  for(const u of units){
    if(u.hp<=0)continue;
    u.cd-=dt; if(u.hitFx>0)u.hitFx-=dt;
    const foes=enemiesOf(u.side);
    let [tgt,td]=nearest(u,foes);
    const base=u.side==='p'?EBASE:PBASE;
    const baseDist=Math.hypot(base.x-u.x,base.y-u.y);
    if(!tgt||td>200){
      if(baseDist>u.rng+24){moveTo(u,base.x,base.y,dt);}
      else if(u.cd<=0){u.cd=u.iv; attackBase(u);}
    }else{
      if(td>u.rng+u.r){moveTo(u,tgt.x,tgt.y,dt);}
      else if(u.cd<=0){u.cd=u.iv; attack(u,tgt);}
    }
  }
  for(const side of ['p','e']){
    baseCd[side]-=dt;
    const b=side==='p'?PBASE:EBASE;
    let near=null,nd=1e9;
    for(const e of enemiesOf(side)){const d=Math.hypot(e.x-b.x,e.y-b.y);if(d<150&&d<nd){nd=d;near=e;}}
    if(near&&baseCd[side]<=0){baseCd[side]=0.9; shots.push({x:b.x,y:b.y,tx:near,dmg:55*(1+0.5*(LEVEL-1)/29),sp:380,col:'#ffd34d',side});}
  }
  for(const s of shots){
    const tgt=s.tx;
    if(!tgt||(tgt.hp<=0&&!tgt.isBase)){s.dead=true;continue;}
    const dx=tgt.x-s.x,dy=tgt.y-s.y,d=Math.hypot(dx,dy),mv=s.sp*dt;
    if(d<=mv){
      if(tgt.isBase){ baseDamage(tgt.bside,s.dmg,tgt.x,tgt.y); }
      else{
        dealDamage(tgt,s.dmg);
        if(s.aoe){for(const e of enemiesOf(s.side)){if(e!==tgt&&Math.hypot(e.x-tgt.x,e.y-tgt.y)<48)dealDamage(e,s.dmg*0.5);}}
      }
      burst(tgt.x,tgt.y,s.col); s.dead=true;
    }else{s.x+=dx/d*mv;s.y+=dy/d*mv;}
  }
  shots=shots.filter(s=>!s.dead);
  for(const f of floats){f.t+=dt;f.y-=26*dt;} floats=floats.filter(f=>f.t<0.8);
  for(const p of particles){p.t+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=160*dt;} particles=particles.filter(p=>p.t<0.5);
  for(const u of units){if(u.hp<=0&&!u.dead){u.dead=true;burst(u.x,u.y,u.color);}}
  units=units.filter(u=>!u.dead);
  if(eBaseHP<=0)endGame(true); else if(pBaseHP<=0)endGame(false);
}

function endGame(win){
  gameOver=true;
  const o=document.getElementById('over'), t=document.getElementById('overt');
  t.textContent=win?'胜利！':'失败…';
  t.className=win?'win':'lose';
  o.classList.add('show');
}

// ===================== 控制 =====================
function reset(){
  units=[];shots=[];floats=[];particles=[];
  pBaseHP=eBaseHP=pBaseMax=eBaseMax=3200;
  baseCd={p:0,e:0}; elixir=5; eElix=5; aiTimer=2; sel=-1; gameOver=false;
  document.getElementById('over').classList.remove('show');
  initDeck(); renderHand(); renderElix();
}
const lvl=document.getElementById('lvl');
lvl.addEventListener('input',()=>{
  LEVEL=+lvl.value;
  const m=(1+(3.0-1)/29*(LEVEL-1));
  document.getElementById('lvlv').textContent='Lv'+LEVEL+' ×'+m.toFixed(2);
});
document.getElementById('restart').onclick=reset;
document.getElementById('again').onclick=reset;

reset();
requestAnimationFrame(loop);
</script>
